name: Bug report
description: Report a reproducible problem in the local pipeline.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the command and stage number. Do not upload private media, secrets, or model files.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        CUDA:
        FFmpeg:
        GPU:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the relevant error text. Redact API keys and local private paths if needed.
      render: shell
