name: Python checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile scripts
        run: python -m compileall scripts

      - name: Check shell script syntax
        run: bash -n scripts/01_process_vocals.sh

      - name: Run tests
        run: pytest -q

      - name: Dry-run pipeline
        run: python scripts/run_pipeline.py --config configs/default.yaml --dry-run --from-stage 0 --to-stage 6
